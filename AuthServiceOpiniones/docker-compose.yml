version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gestor_opiniones_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: gestor_opiniones
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: